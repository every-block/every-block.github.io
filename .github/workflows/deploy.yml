name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch survey data
        env:
          BLOCKS_SHEET_ID: ${{ vars.BLOCKS_SHEET_ID }}
          BLOCKS_SHEET_GID: ${{ vars.BLOCKS_SHEET_GID }}
          RESPONSES_SHEET_ID: ${{ vars.RESPONSES_SHEET_ID }}
          RESPONSES_SHEET_GID: ${{ vars.RESPONSES_SHEET_GID }}
        run: bun run fetch:data

      - name: Build
        run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
